name: Deploy Apollo SQL bridge

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to copy and restart the read-only bridge on BLADERUNNER-PC
        required: true
        type: string
      sku:
        description: SKU used for the post-deploy read-only product lookup
        required: false
        default: '8626100145'
        type: string

permissions:
  contents: read

concurrency:
  group: apollo-sql-bridge-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.inputs.confirm == 'DEPLOY'
    runs-on: [self-hosted, Windows, X64, proto-bridge]
    timeout-minutes: 10
    steps:
      - name: Download approved bridge files, deploy, and verify
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Join-Path $env:RUNNER_TEMP 'protoportal-admin-bridge-source'
          Remove-Item -LiteralPath $source -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path (Join-Path $source 'scripts') | Out-Null
          $baseUrl = 'https://raw.githubusercontent.com/ProtoTrading-CO/protoportal-admin/${{ github.sha }}'
          foreach ($file in @('sql-stmast-bridge.py', 'sql_report_catalogue.py', 'deploy_bridge_local.ps1')) {
            $destination = Join-Path $source "scripts\$file"
            Invoke-WebRequest -UseBasicParsing -Uri "$baseUrl/scripts/$file" -OutFile $destination -TimeoutSec 60
            Unblock-File -LiteralPath $destination
          }
          $deployScript = Join-Path $source 'scripts\deploy_bridge_local.ps1'
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File $deployScript -Sku '${{ inputs.sku }}' -ExpectedCommit '${{ github.sha }}'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
