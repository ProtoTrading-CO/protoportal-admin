name: Deploy Apollo SQL bridge

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to copy and restart the read-only bridge on BLADERUNNER-PC
        required: true
        type: string
      sku:
        description: SKU used for the post-deploy read-only product lookup
        required: false
        default: '8626100145'
        type: string

permissions:
  contents: read

concurrency:
  group: apollo-sql-bridge-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.inputs.confirm == 'DEPLOY'
    runs-on: [self-hosted, Windows, X64, proto-bridge]
    timeout-minutes: 10
    steps:
      - name: Download approved main branch, deploy, and verify
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $archive = Join-Path $env:RUNNER_TEMP 'protoportal-admin-main.zip'
          $extract = Join-Path $env:RUNNER_TEMP 'protoportal-admin-main'
          Remove-Item -LiteralPath $archive -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $extract -Recurse -Force -ErrorAction SilentlyContinue
          Invoke-WebRequest -Uri 'https://github.com/ProtoTrading-CO/protoportal-admin/archive/refs/heads/main.zip' -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $extract -Force
          $source = Get-ChildItem -LiteralPath $extract -Directory | Select-Object -First 1
          if (-not $source) { throw 'Could not find the downloaded main branch source.' }
          & (Join-Path $source.FullName 'scripts\deploy_bridge_local.ps1') -Sku '${{ inputs.sku }}' -ExpectedCommit '${{ github.sha }}'
